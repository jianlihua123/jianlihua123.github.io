<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人主页</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #38bdf8;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 32px;
      margin: 10px 0;
    }

    p {
      color: #94a3b8;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #38bdf8;
      color: #0f172a;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .section {
      margin-top: 50px;
      text-align: left;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    footer {
      margin-top: 50px;
      font-size: 14px;
      color: #64748b;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- 头像 -->
  <img class="avatar" src="https://via.placeholder.com/120" alt="头像">

  <!-- 标题 -->
  <h1>你好，我是 John 👋</h1>
  <p>一个热爱技术 / 产品 / 创业的人</p>

  <!-- 按钮 -->
  <a class="btn" href="https://github.com" target="_blank">我的 GitHub</a>

  <!-- 关于我 -->
  <div class="section">
    <h2>📌 关于我</h2>
    <div class="card">
      <p>这里写你的介绍，比如：</p>
      <ul>
        <li>做什么工作</li>
        <li>擅长什么</li>
        <li>目前在做什么项目</li>
      </ul>
    </div>
  </div>

  <!-- 项目 -->
  <div class="section">
    <h2>🚀 我的项目</h2>

    <div class="card">
      <h3>项目 1</h3>
      <p>简单描述你的项目</p>
    </div>

    <div class="card">
      <h3>项目 2</h3>
      <p>再写一个项目</p>
    </div>

  </div>

  <!-- 联系方式 -->
  <div class="section">
    <h2>📫 联系我</h2>
    <div class="card">
      <p>Email: your@email.com</p>
      <p>微信 / Twitter / LinkedIn</p>
    </div>
  </div>

  <!-- 底部 -->
  <footer>
    © 2026 Your Name
  </footer>

</div>

</body>
</html>
